# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "es-ES"
tone_instructions: "Tono técnico, directo y conciso. Sin emojis, sin rodeos y sin vocabulario corporativo. Estilo profesional y enfocado en la precisión técnica."

reviews:
  profile: "chill"

  # Habilitar auto-review en PRs hacia main y dev
  auto_review:
    enabled: true
    base_branches:
      - "main"
      - "dev"
    drafts: false
    ignore_title_keywords:
      - "WIP"
      - "wip"
      - "DO NOT MERGE"

  # Sin comentarios invasivos línea por línea
  request_changes_workflow: false

  # Resumen de alto nivel activado
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: false
  high_level_summary_instructions: |
    Crea notas de versión concisas y estructuradas.
    NO uses emojis bajo ninguna circunstancia.
    Mantén un tono técnico, profesional y directo.
    IMPORTANTE: Envuelve absoluta y estrictamente TODO tu resumen dentro de una etiqueta HTML colapsable `<details><summary>Análisis automático de CodeRabbit</summary> ... </details>` para que no sea intrusivo en la descripción principal del PR.

  # Walkthrough colapsado, con diagrama de secuencias y archivos cambiados
  collapse_walkthrough: true
  changed_files_summary: true
  sequence_diagrams: true
  review_details: false

  # Sin generación de poemas ni tests unitarios automáticos
  poem: false
  in_progress_fortune: true
  enable_prompt_for_ai_agents: true

  # Métricas de revisión
  review_status: true
  commit_status: true
  fail_commit_status: false

  # Estimaciones de esfuerzo y evaluación de issues vinculados
  estimate_code_review_effort: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_reviewers: true
  labeling_instructions: []
  auto_apply_labels: false
  auto_assign_reviewers: false

  # Anti-Slop activo
  slop_detection:
    enabled: true

  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false
    simplify:
      enabled: false

  tools:
    shellcheck:
      enabled: false

  # Reglas específicas de revisión por ruta de archivos
  path_instructions:
    - path: "package.json"
      instructions: "Las versiones de las dependencias deben estar fijadas exactamente (sin usar '^' ni '~')."
    - path: "**/tests/**/*.ts"
      instructions: "Utilizar el test runner integrado de Node (`node:test`) y desestructurar las funciones de aserción de `node:assert/strict`. No importar el objeto `assert` por defecto."
    - path: "**/*.test.ts"
      instructions: "Utilizar el test runner integrado de Node (`node:test`) y desestructurar las funciones de aserción de `node:assert/strict`. No importar el objeto `assert` por defecto."
    - path: "**/*.node-test.ts"
      instructions: "Utilizar el test runner integrado de Node (`node:test`) y desestructurar las funciones de aserción de `node:assert/strict`. No importar el objeto `assert` por defecto."
    - path: "app/**/*.tsx"
      instructions: "Preferir Server Components por defecto. Añadir 'use client' únicamente cuando sea estrictamente necesario (hooks, APIs del navegador o estado del cliente)."
    - path: "components/**/*.tsx"
      instructions: "Preferir Server Components por defecto. Añadir 'use client' únicamente cuando sea estrictamente necesario (hooks, APIs del navegador o estado del cliente)."
    - path: "**/*.ts"
      instructions: |
        - Los comentarios en el código deben explicar el 'por qué' y lo 'no obvio', no el 'cómo'.
        - Documentar los contratos de las funciones públicas con JSDoc (qué hace, parámetros, retorno y excepciones), sin describir los detalles de implementación interna.
        - Usar marcadores ASCII en comentarios de una sola línea: `[!]` para mutaciones o efectos secundarios peligrosos, `[?]` para enfoques inciertos, `[x]` para rutas obsoletas, y `-->` para redirigir al lector.

chat:
  auto_reply: true

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "**/AGENTS.md"
      - ".github/copilot-instructions.md"
