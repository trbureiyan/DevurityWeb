name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: devurity_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/devurity_ci?schema=public"
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'ci-only-not-a-real-secret' }}
      NEXT_PUBLIC_APP_URL: "https://devurityweb.vercel.app"
      NEXT_PUBLIC_API_URL: "https://devurityweb.vercel.app"

    steps:
      - name: Checkout
 u        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # Cache para el cliente de Prisma generado
      - name: Cache Prisma generated client
        uses: actions/cache@v4
        with:
          path: lib/generated/prisma
          key: prisma-${{ hashFiles('prisma/schema.prisma') }}

      - name: Install dependencies
        run: npm ci

      # Generar el cliente manualmente ya que ignore-scripts de .npmrc bloquea el postinstall
      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Apply DB migrations
        run: npm run db:migrate

      - name: Repair DB sequences
        run: npm run db:repair

      - name: Seed database
        run: npm run db:seed

      # Tests deshabilitados temporalmente — habilitar cuando estén listos para CI
      # - name: Run unit tests
      #   run: npm test

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
